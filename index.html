<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Aprendiz Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tech-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('LMS'); 
            const [subTab, setSubTab] = useState('Desenvolvimento');

            // Resetar subtab ao trocar de aba principal para evitar bugs de visualização
            useEffect(() => {
                if (activeTab === 'B2B') setSubTab('Metodologia');
                if (activeTab === 'INTERACAO') setSubTab('Empresa');
                if (activeTab === 'LMS') setSubTab('Desenvolvimento');
            }, [activeTab]);

            const handleLogin = (e) => {
                e.preventDefault();
                const email = e.target.email.value.toLowerCase();
                const pass = e.target.password.value;

                if (email === 'admin@campsbc.org.br') {
                    setUser({ role: 'ADMIN', name: 'Administrador' });
                } else if (email.includes('.') && email.endsWith('@campsbc.org.br') && pass === 'campsbc') {
                    setUser({ role: 'INSTRUTOR', name: email.split('@')[0].replace('.', ' ') });
                } else if (!email.includes('.') && email.endsWith('@campsbc.org.br') && pass.startsWith('camp@')) {
                    setUser({ role: 'JOVEM', name: email.split('@')[0] });
                } else if (email.includes('parceiro')) {
                    setUser({ role: 'INSTITUICAO', name: 'Parceiro Externo' });
                } else {
                    alert("Acesso Negado. Verifique o formato do e-mail e senha.");
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center tech-gradient p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-700/50 text-center">
                            <h1 className="text-4xl font-[900] text-slate-900 tracking-tighter italic mb-8">APRENDIZ <span className="text-blue-600">PRO</span></h1>
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <input name="email" type="email" placeholder="E-mail (@campsbc.org.br)" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-medium" required />
                                <input name="password" type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                                <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl hover:bg-blue-700 transition transform hover:scale-[1.02]">ACESSAR</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Principal */}
                    <header className="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-2xl font-[900] text-slate-900 tracking-tighter italic">APRENDIZ <span className="text-blue-600">PRO</span></h1>
                        
                        <nav className="flex gap-2 bg-slate-100 p-1 rounded-2xl">
                            {(user.role === 'ADMIN' || user.role === 'JOVEM' || user.role === 'INSTRUTOR') && 
                                <button onClick={() => setActiveTab('LMS')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition ${activeTab === 'LMS' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>LMS Aprendizagem</button>
                            }
                            {(user.role === 'ADMIN' || user.role === 'INSTRUTOR') && 
                                <button onClick={() => setActiveTab('INTERACAO')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition ${activeTab === 'INTERACAO' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>Interação Empresa</button>
                            }
                            {(user.role === 'ADMIN' || user.role === 'INSTITUICAO') && 
                                <button onClick={() => setActiveTab('B2B')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition ${activeTab === 'B2B' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>B2B Aprendizagem</button>
                            }
                        </nav>

                        <div className="flex items-center gap-4">
                            <div className="text-right hidden md:block">
                                <p className="text-[10px] font-black text-slate-900 uppercase leading-none">{user.name}</p>
                                <p className="text-[8px] text-blue-500 font-bold uppercase mt-1 tracking-widest">{user.role}</p>
                            </div>
                            <button onClick={() => setUser(null)} className="text-red-500 font-black text-xs hover:underline">SAIR</button>
                        </div>
                    </header>

                    <main className="flex-grow p-8 max-w-7xl mx-auto w-full animate-in">
                        
                        {/* CONTEÚDO DA ABA LMS */}
                        {activeTab === 'LMS' && (
                            <div>
                                <div className="flex gap-4 mb-6 border-b border-slate-200 pb-2 overflow-x-auto">
                                    <button onClick={() => setSubTab('Desenvolvimento')} className={`pb-2 text-xs font-black uppercase tracking-widest ${subTab === 'Desenvolvimento' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-400'}`}>Trilha de Desenvolvimento</button>
                                    <button onClick={() => setSubTab('Calendario')} className={`pb-2 text-xs font-black uppercase tracking-widest ${subTab === 'Calendario' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-400'}`}>Calendário do Jovem</button>
                                    <button onClick={() => setSubTab('Programa')} className={`pb-2 text-xs font-black uppercase tracking-widest ${subTab === 'Programa' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-400'}`}>Programa do Curso</button>
                                    {user.role === 'INSTRUTOR' && <button onClick={() => setSubTab('Chamada')} className={`pb-2 text-xs font-black uppercase tracking-widest ${subTab === 'Chamada' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-400'}`}>Chamada da Turma</button>}
                                </div>

                                <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm min-h-[400px]">
                                    {subTab === 'Desenvolvimento' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                                            <div className="aspect-video bg-slate-900 rounded-[2rem] flex items-center justify-center text-white font-bold italic border-8 border-white shadow-xl">
                                                [Player de Vídeo YouTube]
                                            </div>
                                            <div>
                                                <h3 className="text-3xl font-black text-slate-900 tracking-tighter uppercase italic mb-4 leading-tight">LABS: Ciclo Inicial</h3>
                                                <p className="text-slate-500 mb-6">Assista aos encontros e laboratórios para desenvolver suas competências profissionais.</p>
                                                <button className="w-full py-4 bg-blue-50 text-blue-600 rounded-2xl font-black hover:bg-blue-600 hover:text-white transition-all shadow-sm">CONFIRMAR PRESENÇA</button>
                                            </div>
                                        </div>
                                    )}
                                    {subTab === 'Calendario' && <div className="p-4 bg-slate-50 rounded-2xl border border-dashed border-slate-300 text-center text-slate-500">Cronograma de Aulas e Encontros em breve.</div>}
                                    {subTab === 'Programa' && <div className="p-4 bg-slate-50 rounded-2xl border border-dashed border-slate-300 text-center text-slate-500">Matriz e Programa completo do curso.</div>}
                                    {subTab === 'Chamada' && <div className="p-4 bg-green-50 rounded-2xl border border-green-200 text-green-700 font-bold">Painel de Frequência das Turmas do Mentor.</div>}
                                </div>
                            </div>
                        )}

                        {/* CONTEÚDO DA ABA INTERAÇÃO RH/GESTOR */}
                        {activeTab === 'INTERACAO' && (
                            <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                <h2 className="text-3xl font-black text-slate-900 mb-6 tracking-tighter uppercase italic">Portal de Interação RH & Mentor</h2>
                                <div className="space-y-4">
                                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest">Acompanhamento Prático</p>
                                            <h4 className="font-bold text-slate-800 text-lg">Dossiê e Avaliação de Desempenho</h4>
                                        </div>
                                        <button className="bg-white px-6 py-2 rounded-xl text-xs font-black border shadow-sm hover:bg-slate-900 hover:text-white transition">VER ANEXOS</button>
                                    </div>
                                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                        <h4 className="font-bold text-slate-800 mb-4">Histórico de Ocorrências</h4>
                                        <div className="flex items-center gap-4 text-sm text-slate-500 border-l-2 border-blue-500 pl-4 py-2 italic">
                                            Aguardando novos registros de desempenho do Jovem.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CONTEÚDO DA ABA B2B APRENDIZAGEM */}
                        {activeTab === 'B2B' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                    <h2 className="text-3xl font-black text-slate-900 mb-8 tracking-tighter uppercase italic">B2B: Metodologia Aprendiz Pro</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {['Matriz Curricular', 'Ementas de Cursos', 'Planos de Aula LABS', 'Materiais Complementares'].map(item => (
                                            <div key={item} className="p-6 border border-slate-100 rounded-3xl hover:bg-blue-50 hover:border-blue-200 transition-all cursor-pointer group">
                                                <h4 className="font-bold text-slate-700 group-hover:text-blue-600">{item}</h4>
                                                <p className="text-[10px] text-slate-400 font-bold mt-2 uppercase">Acessar Documentação</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-blue-600 p-10 rounded-[2.5rem] text-white flex flex-col justify-between shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h3 className="text-2xl font-black uppercase mb-4 tracking-tighter">Capacitação Profissional</h3>
                                        <p className="text-blue-100 text-sm leading-relaxed">Adquira agora a certificação completa da metodologia para sua instituição parceira.</p>
                                    </div>
                                    <a href="https://campsbc.org.br" target="_blank" className="relative z-10 w-full py-4 bg-white text-blue-600 rounded-2xl font-black mt-8 text-center hover:bg-blue-50 transition shadow-lg">QUERO ADQUIRIR</a>
                                    <div className="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-500 rounded-full opacity-30"></div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

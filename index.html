<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Aprendiz Pro | Camp SBC</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tech-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('LMS');
            const [subTab, setSubTab] = useState('Desenvolvimento');

            const handleLogin = (e) => {
                e.preventDefault();
                // .trim() remove espaços acidentais e .toLowerCase() padroniza minúsculas
                const email = e.target.email.value.trim().toLowerCase();
                const pass = e.target.password.value.trim();
                const anoAtual = new Date().getFullYear();

                // 1. Lógica ADMINISTRADOR
                if (email === 'admin@campsbc.org.br') {
                    if (pass === `campsbcadm@${anoAtual}`) {
                        return setUser({ role: 'ADMIN', name: 'GESTOR MASTER' });
                    } else { alert(`Senha Admin incorreta para ${anoAtual}`); return; }
                } 
                
                // 2. Lógica JOVEM APRENDIZ (Ex: diegosilvaaprendiz@campsbc.org.br)
                if (email.includes('aprendiz@campsbc.org.br')) {
                    if (pass.startsWith('camp@') && pass.length >= 9) {
                        return setUser({ role: 'JOVEM', name: email.split('aprendiz@')[0].toUpperCase() });
                    } else { alert("Senha do Jovem deve ser camp@ANO (ex: camp@2026)"); return; }
                }

                // 3. Lógica INSTRUTOR (Ex: diego.raphael@campsbc.org.br)
                if (email.includes('.') && email.endsWith('@campsbc.org.br')) {
                    if (pass === 'campsbc') {
                        return setUser({ role: 'INSTRUTOR', name: email.split('@')[0].replace('.', ' ').toUpperCase() });
                    } else { alert("Senha do Instrutor padrão: campsbc"); return; }
                }

                // 4. Lógica INSTITUIÇÃO CLIENTE (Ex: campsantoandre@campsbc.org.br)
                if (email.endsWith('@campsbc.org.br')) {
                    const unidade = email.split('@')[0];
                    const partesSenha = pass.split('@');
                    // Valida se a senha é exatamente unidade@ano
                    if (partesSenha[0] === unidade && partesSenha[1] && partesSenha[1].length === 4) {
                        return setUser({ role: 'INSTITUICAO', name: unidade.toUpperCase() });
                    } else { alert(`Senha da Instituição deve ser: ${unidade}@ano`); return; }
                }

                alert("E-mail não reconhecido ou formato inválido.");
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center tech-gradient p-4">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center animate-fadeIn border border-slate-700/50">
                            <h1 className="text-4xl font-[900] text-slate-900 tracking-tighter italic mb-2">APRENDIZ <span className="text-blue-600">PRO</span></h1>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-10">Login do Sistema</p>
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <input name="email" type="email" placeholder="E-mail Institucional" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                                <input name="password" type="password" placeholder="Senha de Acesso" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                                <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-2xl font-[900] shadow-xl hover:bg-blue-700 transition uppercase italic tracking-tighter">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-5 flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-2xl font-[900] text-slate-900 tracking-tighter italic">APRENDIZ <span className="text-blue-600">PRO</span></h1>
                        <nav className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                            {(user.role === 'ADMIN' || user.role === 'JOVEM' || user.role === 'INSTRUTOR') && 
                                <button onClick={() => setActiveTab('LMS')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition ${activeTab === 'LMS' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>LMS</button>
                            }
                            {(user.role === 'ADMIN' || user.role === 'INSTRUTOR') && 
                                <button onClick={() => setActiveTab('INTERACAO')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition ${activeTab === 'INTERACAO' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>Interação</button>
                            }
                            {(user.role === 'ADMIN' || user.role === 'INSTITUICAO') && 
                                <button onClick={() => setActiveTab('B2B')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition ${activeTab === 'B2B' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>B2B Aprendizagem</button>
                            }
                        </nav>
                        <button onClick={() => setUser(null)} className="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full font-bold hover:bg-red-500 hover:text-white transition-all">✕</button>
                    </header>

                    <main className="flex-grow p-8 max-w-7xl mx-auto w-full animate-fadeIn">
                        <div className="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm">
                            <h2 className="text-4xl font-[900] text-slate-900 mb-4 italic uppercase tracking-tighter">{activeTab}</h2>
                            <p className="text-slate-400 font-bold uppercase tracking-widest text-[10px] mb-8">Olá, {user.name} • Perfil: {user.role}</p>
                            
                            {activeTab === 'LMS' && <div className="p-12 text-center text-slate-400 border-4 border-dashed rounded-[2rem]">Área de Desenvolvimento e LABS ativada.</div>}
                            {activeTab === 'INTERACAO' && <div className="p-12 text-center text-slate-400 border-4 border-dashed rounded-[2rem]">Portal de Conectividade RH & Mentor.</div>}
                            {activeTab === 'B2B' && <div className="p-12 text-center text-slate-400 border-4 border-dashed rounded-[2rem]">Repositório de Metodologia Aprendiz Pro.</div>}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

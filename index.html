<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #1e293b; }
        .login-box { background: white; border-radius: 2rem; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-area" class="login-box">
        <h1 class="text-3xl font-black italic text-center mb-1">APRENDIZ <span class="text-blue-600">PRO</span></h1>
        <p class="text-[10px] font-bold text-slate-400 text-center uppercase tracking-widest mb-8">Camp SBC • 2026</p>
        
        <div class="space-y-4">
            <input id="f_email" type="text" placeholder="E-mail Institucional" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-600">
            <input id="f_pass" type="password" placeholder="Senha" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-600">
            <button onclick="tentarAcesso()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase italic tracking-tighter shadow-lg hover:bg-blue-700 transition">Entrar</button>
        </div>
    </div>

    <div id="dashboard-area" class="hidden w-full max-w-4xl bg-white p-10 rounded-[3rem] shadow-2xl">
        <h2 class="text-3xl font-black italic uppercase tracking-tighter mb-4">Portal Liberado</h2>
        <div id="msg-sucesso" class="p-10 border-4 border-dashed rounded-[2rem] text-slate-400 font-bold text-center">
            Bem-vindo ao sistema Aprendiz Pro.
        </div>
        <button onclick="window.location.reload()" class="mt-6 text-red-500 font-bold text-xs uppercase">Sair</button>
    </div>

    <script>
        function tentarAcesso() {
            const e = document.getElementById('f_email').value.trim().toLowerCase();
            const p = document.getElementById('f_pass').value.trim();
            const ano = new Date().getFullYear(); // 2026

            console.log("Tentativa de login:", e, p); // Ver no console do navegador (F12)

            let permitido = false;
            let info = "";

            // Lógica Master 2026
            if (e === "admin@campsbc.org.br" && p === "campsbcadm@" + ano) {
                permitido = true; info = "ADMINISTRADOR MASTER";
            } 
            else if (e.indexOf("aprendiz@campsbc.org.br") !== -1 && p.startsWith("camp@")) {
                permitido = true; info = "JOVEM APRENDIZ";
            }
            else if (e.indexOf(".") !== -1 && e.indexOf("@campsbc.org.br") !== -1 && p === "campsbc") {
                permitido = true; info = "INSTRUTOR MENTOR";
            }
            else if (e.indexOf("@campsbc.org.br") !== -1 && p.indexOf("@") !== -1) {
                const uE = e.split("@")[0];
                const uP = p.split("@")[0];
                if (uE === uP) { permitido = true; info = "B2B APRENDIZAGEM (" + uE.toUpperCase() + ")"; }
            }

            if (permitido) {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('dashboard-area').classList.remove('hidden');
                document.getElementById('msg-sucesso').innerText = "Perfil identificado: " + info + "\nAcesso concedido com sucesso.";
                document.body.style.backgroundColor = "#F8FAFC";
            } else {
                alert("ACESSO NEGADO!\n\nDados digitados:\nE-mail: " + e + "\nSenha: " + p + "\n\nAs regras de 2026 exigem o padrão correto.");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

    <div id="app-root" class="w-full flex justify-center">
        <div id="login-view" class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border border-slate-200 fade-in">
            <h1 class="text-4xl font-[900] text-slate-900 tracking-tighter italic mb-1 uppercase leading-none text-center">APRENDIZ <span class="text-blue-600">PRO</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-10 text-center">Intelligence Learning System</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest leading-none">E-mail Institucional</label>
                    <input id="inp-email" type="text" placeholder="nome@campsbc.org.br" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-medium text-slate-700 mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest leading-none">Senha de Acesso</label>
                    <input id="inp-pass" type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-medium text-slate-700 mt-1">
                </div>
                <button onclick="tentarEntrar()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-[900] uppercase italic tracking-tighter shadow-xl hover:bg-blue-700 transition active:scale-95">Entrar no Portal</button>
            </div>
            <p class="text-[9px] text-slate-300 mt-8 text-center uppercase font-bold tracking-widest italic leading-none">Camp SBC • Gestão 2026</p>
        </div>

        <div id="dash-view" class="hidden w-full max-w-6xl bg-[#F8FAFC] rounded-[3.5rem] shadow-2xl overflow-hidden flex flex-col min-h-[700px] fade-in border border-white">
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-10 py-6 flex justify-between items-center sticky top-0 z-50">
                <h1 class="text-2xl font-[900] italic tracking-tighter text-slate-900">APRENDIZ <span class="text-blue-600">PRO</span></h1>
                <div class="flex items-center gap-6">
                    <div class="text-right border-r pr-6 border-slate-200">
                        <p id="display-user" class="text-xs font-black uppercase text-slate-900 leading-none"></p>
                        <p id="display-role" class="text-[9px] text-blue-500 font-bold uppercase tracking-widest mt-1 italic"></p>
                    </div>
                    <button onclick="window.location.reload()" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full font-bold hover:bg-red-500 hover:text-white transition">✕</button>
                </div>
            </header>

            <nav id="nav-container" class="bg-white border-b border-slate-200 px-10 flex gap-10 overflow-x-auto whitespace-nowrap scrollbar-hide"></nav>

            <main class="p-10 flex-grow" id="main-content"></main>
        </div>
    </div>

    <script>
        let currentUser = null;

        function tentarEntrar() {
            const e = document.getElementById('inp-email').value.trim().toLowerCase();
            const p = document.getElementById('inp-pass').value.trim();
            const ano = new Date().getFullYear();

            // Lógica de Perfis Blindada
            if (e === 'admin@campsbc.org.br' && p === 'campsbcadm@' + ano) {
                currentUser = { r: 'ADMIN', n: 'GESTOR MASTER', tabs: ['LMS Aprendizagem', 'Interação Empresa', 'B2B Aprendizagem'] };
            } else if (e.includes('aprendiz@campsbc.org.br') && p.startsWith('camp@')) {
                currentUser = { r: 'JOVEM', n: e.split('aprendiz')[0].toUpperCase(), tabs: ['LMS Aprendizagem'] };
            } else if (e.includes('.') && e.endsWith('@campsbc.org.br') && p === 'campsbc') {
                currentUser = { r: 'INSTRUTOR', n: e.split('@')[0].replace('.',' ').toUpperCase(), tabs: ['LMS Aprendizagem', 'Interação Empresa'] };
            } else if (e.endsWith('@campsbc.org.br') && p.includes('@') && e.split('@')[0] === p.split('@')[0]) {
                currentUser = { r: 'B2B', n: e.split('@')[0].toUpperCase(), tabs: ['B2B Aprendizagem'] };
            }

            if (currentUser) {

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .card-login { background: white; border-radius: 2.5rem; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full flex justify-center">
        <div class="card-login animate-in fade-in duration-500">
            <h1 class="text-3xl font-[900] text-slate-900 tracking-tighter italic text-center mb-2 uppercase">APRENDIZ <span class="text-blue-600">PRO</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-8">Portal Camp SBC 2026</p>
            
            <form id="loginForm" class="space-y-4">
                <input id="inpEmail" type="text" placeholder="E-mail Institucional" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-medium text-slate-700">
                <input id="inpPass" type="password" placeholder="Senha de Acesso" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-medium text-slate-700">
                <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-[900] uppercase italic tracking-tighter shadow-xl hover:bg-blue-700 transition transform active:scale-95">Entrar no Sistema</button>
            </form>
            <p class="text-[9px] text-slate-300 mt-6 text-center uppercase font-bold tracking-tighter">Verifique as regras de login de 2026</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            
            // LIMPANDO OS DADOS (Prevenção de erros de digitação)
            const email = document.getElementById('inpEmail').value.toLowerCase().trim();
            const pass = document.getElementById('inpPass').value.trim();
            const ano = new Date().getFullYear(); // 2026

            let logado = false;
            let user = { nome: "", cargo: "" };

            // --- MOTOR DE BUSCA DE PERFIL (REFATORADO) ---

            // 1. ADMIN
            if (email === "admin@campsbc.org.br" && pass === "campsbcadm@" + ano) {
                logado = true;
                user = { nome: "GESTOR MASTER", cargo: "ADMINISTRADOR" };
            }
            // 2. JOVEM (Busca a palavra 'aprendiz' no e-mail)
            else if (email.indexOf("aprendiz@campsbc.org.br") !== -1 && pass.startsWith("camp@")) {
                logado = true;
                user = { nome: email.split("aprendiz")[0].toUpperCase(), cargo: "JOVEM APRENDIZ" };
            }
            // 3. INSTRUTOR (Busca o PONTO no nome)
            else if (email.indexOf(".") !== -1 && email.indexOf("@campsbc.org.br") !== -1 && pass === "campsbc") {
                logado = true;
                user = { nome: email.split("@")[0].replace(".", " ").toUpperCase(), cargo: "INSTRUTOR MENTOR" };
            }
            // 4. B2B (Unidade@Ano)
            else if (email.indexOf("@campsbc.org.br") !== -1 && pass.indexOf("@") !== -1) {
                const unidadeEmail = email.split("@")[0];
                const unidadeSenha = pass.split("@")[0];
                if (unidadeEmail === unidadeSenha) {
                    logado = true;
                    user = { nome: unidadeEmail.toUpperCase(), cargo: "B2B APRENDIZAGEM" };
                }
            }

            if (logado) {
                exibirPainel(user);
            } else {
                alert("ACESSO NEGADO!\n\nConfira se o e-mail termina com @campsbc.org.br e se a senha segue o padrão de 2026.");
            }
        };

        function exibirPainel(u) {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen w-full bg-white flex flex-col animate-in fade-in duration-700">
                    <header class="p-6 border-b flex justify-between items-center bg-slate-50 shadow-sm">
                        <h1 class="text-xl font-black italic tracking-tighter text-slate-900">APRENDIZ <span class="text-blue-600">PRO</span></h1>
                        <div class="text-right">
                            <p class="text-xs font-black uppercase leading-none text-slate-900">${u.nome}</p>
                            <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest mt-1">${u.cargo}</p>
                        </div>

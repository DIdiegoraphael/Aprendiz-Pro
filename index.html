<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; overflow-x: hidden; }
        .app-card { background: white; border-radius: 2.5rem; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="w-full flex justify-center fade-in">
        
        <div id="login-section" class="app-card">
            <h1 class="text-3xl font-[900] text-slate-900 tracking-tighter italic text-center mb-1 uppercase leading-none">APRENDIZ <span class="text-blue-600">PRO</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] text-center mb-8">Intelligence Learning System</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">E-mail Institucional</label>
                    <input id="user_email" type="text" placeholder="nome@campsbc.org.br" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition font-medium text-slate-700">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Senha de Acesso</label>
                    <input id="user_pass" type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition font-medium text-slate-700">
                </div>
                <button onclick="executarLogin()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-[900] uppercase italic tracking-tighter shadow-xl hover:bg-blue-700 transition active:scale-95">Entrar no Portal</button>
            </div>
            <p class="text-[9px] text-slate-300 mt-6 text-center uppercase font-bold tracking-tight">Camp SBC • Gestão de Aprendizagem 2026</p>
        </div>

        <div id="dashboard-section" class="hidden w-full max-w-6xl bg-white rounded-[3rem] shadow-2xl overflow-hidden fade-in min-h-[600px] flex flex-col">
            <header class="p-6 bg-slate-50 border-b flex justify-between items-center px-10">

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tech-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="app">
        <div class="min-h-screen flex items-center justify-center tech-gradient p-4">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
                <h1 class="text-4xl font-[900] text-slate-900 tracking-tighter italic mb-8 uppercase">APRENDIZ <span class="text-blue-600">PRO</span></h1>
                <form id="authForm" class="space-y-4 text-left">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Login Institucional</label>
                        <input id="login_email" type="text" placeholder="nome@campsbc.org.br" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-medium" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Senha de Acesso</label>
                        <input id="login_pass" type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-medium" required>
                    </div>
                    <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-[900] uppercase italic tracking-tighter shadow-xl hover:bg-blue-700 transition transform hover:scale-[1.02]">Entrar na Plataforma</button>
                </form>
            </div>
        </div>
    </div>

                }

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; overflow-x: hidden; }
        .app-card { background: white; border-radius: 2.5rem; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="w-full flex justify-center fade-in">
        
        <div id="login-section" class="app-card">
            <h1 class="text-3xl font-[900] text-slate-900 tracking-tighter italic text-center mb-1 uppercase leading-none">APRENDIZ <span class="text-blue-600">PRO</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] text-center mb-8">Intelligence Learning System</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">E-mail Institucional</label>
                    <input id="user_email" type="text" placeholder="nome@campsbc.org.br" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition font-medium text-slate-700">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Senha de Acesso</label>
                    <input id="user_pass" type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition font-medium text-slate-700">
                </div>
                <button onclick="executarLogin()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-[900] uppercase italic tracking-tighter shadow-xl hover:bg-blue-700 transition active:scale-95">Entrar no Portal</button>
            </div>
            <p class="text-[9px] text-slate-300 mt-6 text-center uppercase font-bold tracking-tight">Camp SBC • Gestão de Aprendizagem 2026</p>
        </div>

        <div id="dashboard-section" class="hidden w-full max-w-6xl bg-white rounded-[3rem] shadow-2xl overflow-hidden fade-in min-h-[600px] flex flex-col">
            <header class="p-6 bg-slate-50 border-b flex justify-between items-center px-10">
                <h1 class="text-2xl font-[900] italic tracking-tighter">APRENDIZ <span class="text-blue-600">PRO</span></h1>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p id="usr-name" class="text-xs font-black uppercase text-slate-900 leading-none"></p>
                        <p id="usr-role" class="text-[9px] text-blue-500 font-bold uppercase tracking-widest mt-1"></p>
                    </div>
                    <button onclick="window.location.reload()" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full font-bold hover:bg-red-500 hover:text-white transition">✕</button>
                </div>
            </header>
            <main class="p-12 flex-grow">
                <h2 class="text-4xl font-black italic text-slate-900 uppercase tracking-tighter mb-8" id="welcome-msg">Portal Ativado</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100 hover:border-blue-300 transition cursor-pointer">
                        <p class="text-[10px] font-black text-blue-500 uppercase italic mb-2 tracking-widest">Módulo I</p>
                        <h4 class="text-xl font-bold uppercase italic tracking-tighter">LMS Aprendizagem</h4>
                    </div>
                    <div class="p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100 hover:border-blue-300 transition cursor-pointer">
                        <p class="text-[10px] font-black text-blue-500 uppercase italic mb-2 tracking-widest">Módulo II</p>
                        <h4 class="text-xl font-bold uppercase italic tracking-tighter">B2B Aprendizagem</h4>
                    </div>
                    <div class="p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100 hover:border-blue-300 transition cursor-pointer">
                        <p class="text-[10px] font-black text-blue-500 uppercase italic mb-2 tracking-widest">Módulo III</p>
                        <h4 class="text-xl font-bold uppercase italic tracking-tighter">Interação Empresa</h4>
                    </div>
                </div>
            </main>
        </div>

    </div>

    <script>
        function executarLogin() {
            const email = document.getElementById('user_email').value.trim().toLowerCase();
            const pass = document.getElementById('user_pass').value.trim();
            const ano = new Date().getFullYear(); // 2026

            let auth = null;

            // 1. ADMIN
            if (email === "admin@campsbc.org.br" && pass === "campsbcadm@" + ano) {
                auth = { role: "ADMIN MASTER", name: "GESTOR CAMP" };
            }
            // 2. JOVEM (Contém 'aprendiz' no e-mail)
            else if (email.indexOf("aprendiz@campsbc.org.br") !== -1 && pass.startsWith("camp@")) {
                auth = { role: "JOVEM APRENDIZ", name: email.split("aprendiz")[0].toUpperCase() };
            }
            // 3. INSTRUTOR (Contém '.' no e-mail)
            else if (email.indexOf(".") !== -1 && email.indexOf("@campsbc.org.br") !== -1 && pass === "campsbc") {
                auth = { role: "INSTRUTOR MENTOR", name: email.split("@")[0].replace(".", " ").toUpperCase() };
            }
            // 4. B2B (Padrão unidade@ano)
            else if (email.endsWith("@campsbc.org.br") && pass.indexOf("@") !== -1) {
                const unidadeEmail = email.split("@")[0];
                const unidadeSenha = pass.split("@")[0];
                if (unidadeEmail === unidadeSenha) {
                    auth = { role: "B2B APRENDIZAGEM", name: unidadeEmail.toUpperCase() };
                }
            }

            if (auth) {
                // TROCA DE TELA MANUAL (MAIS SEGURO)
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                
                document.getElementById('usr-name').innerText = auth.name;
                document.getElementById('usr-role').innerText = auth.role;
                document.getElementById('welcome-msg').innerText = "Portal " + auth.role;
                
                // Força o ajuste do fundo para branco no dashboard
                document.body.style.backgroundColor = "#F8FAFC";
            } else {
                alert("ACESSO NEGADO!\n\nVerifique se o e-mail institucional e a senha seguem o padrão de 2026.");
            }
        }
    </script>
</body>
</html>

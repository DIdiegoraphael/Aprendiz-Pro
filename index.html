<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .card { background: white; color: #1e293b; border-radius: 2rem; padding: 2.5rem; width: 100%; max-width: 400px; shadow: 2xl; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="card">
        <h1 class="text-3xl font-black italic text-center mb-2">APRENDIZ <span class="text-blue-600">PRO</span></h1>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-8">Login 2026 • Camp SBC</p>
        
        <form id="form" class="space-y-4">
            <input id="userEmail" type="email" placeholder="E-mail (@campsbc.org.br)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none" required>
            <input id="userPass" type="password" placeholder="Senha" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none" required>
            <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase italic shadow-xl hover:bg-blue-700 transition">Acessar Sistema</button>
        </form>
    </div>

    <script>
        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('userEmail').value.trim().toLowerCase();
            const pass = document.getElementById('userPass').value.trim();
            const ano = new Date().getFullYear();

            // Validação consolidada para 2026
            if (email === 'admin@campsbc.org.br' && pass === 'campsbcadm@' + ano) {
                alert("ACESSO: ADMIN MASTER");
            } else if (email.includes('aprendiz@campsbc.org.br') && pass.startsWith('camp@')) {
                alert("ACESSO: JOVEM APRENDIZ");
            } else if (email.includes('.') && email.endsWith('@campsbc.org.br') && pass === 'campsbc') {
                alert("ACESSO: INSTRUTOR");
            } else if (email.endsWith('@campsbc.org.br') && pass.includes('@')) {
                alert("ACESSO: B2B APRENDIZAGEM");
            } else {
                alert("Erro! Verifique as regras de login para 2026.");
            }
        };
    </script>
</body>
</html>

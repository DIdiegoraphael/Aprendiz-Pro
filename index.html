<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [user, setUser] = useState(null);

            const handleLogin = (e) => {
                e.preventDefault();
                const email = e.target.email.value.trim().toLowerCase();
                const pass = e.target.password.value.trim();
                const ano = new Date().getFullYear();

                // Regras Consolidadas
                if (email === 'admin@campsbc.org.br' && pass === `campsbcadm@${ano}`) {
                    setUser({ role: 'ADMIN', name: 'GESTOR' });
                } else if (email.includes('aprendiz@campsbc.org.br') && pass.startsWith('camp@')) {
                    setUser({ role: 'JOVEM', name: 'APRENDIZ' });
                } else if (email.includes('.') && email.endsWith('@campsbc.org.br') && pass === 'campsbc') {
                    setUser({ role: 'INSTRUTOR', name: 'INSTRUTOR' });
                } else if (email.endsWith('@campsbc.org.br') && pass.includes('@')) {
                    setUser({ role: 'B2B', name: 'INSTITUIÇÃO' });
                } else {
                    alert("Erro de Login! Verifique e-mail e senha.");
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center">
                            <h1 className="text-3xl font-black italic mb-6">APRENDIZ <span className="text-blue-600">PRO</span></h1>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input name="email" type="email" placeholder="E-mail Institucional" className="w-full p-4 bg-slate-100 rounded-2xl outline-none border" required />
                                <input name="password" type="password" placeholder="Senha" className="w-full p-4 bg-slate-100 rounded-2xl outline-none border" required />
                                <button className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase italic shadow-lg">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white p-10">
                    <h1 className="text-2xl font-black italic mb-4">Bem-vindo, {user.name}!</h1>
                    <div className="p-10 border-4 border-dashed rounded-[3rem] text-slate-400 text-center font-bold">
                        Plataforma Aprendiz Pro Ativada (Perfil: {user.role})
                    </div>
                    <button onClick={() => setUser(null)} className="mt-8 text-red-500 font-bold uppercase text-xs">Sair do Sistema</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

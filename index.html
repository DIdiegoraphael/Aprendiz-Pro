<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-style: italic; font-weight: 900; color: #0f172a; margin: 0; font-size: 28px; }
        .blue { color: #2563eb; }
        .input-box { text-align: left; margin-top: 25px; }
        label { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-left: 5px; }
        input { width: 100%; padding: 15px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 14px; }
        button { width: 100%; padding: 18px; background-color: #2563eb; color: white; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; font-style: italic; cursor: pointer; margin-top: 10px; }
        .hidden { display: none !important; }
        
        /* Dashboard */
        #dashboard { background: #f8fafc; width: 95%; max-width: 1100px; border-radius: 40px; min-height: 600px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        .top-bar { background: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .nav-bar { background: white; padding: 0 40px; display: flex; gap: 30px; border-bottom: 1px solid #e2e8f0; }
        .nav-item { background: none; border: none; padding: 20px 0; font-weight: 900; font-size: 11px; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .nav-item.active { color: #2563eb; border-bottom-color: #2563eb; }
        .main-content { padding: 40px; flex-grow: 1; }
    </style>
</head>
<body>

    <div id="view-login" class="login-card">
        <h1>APRENDIZ <span class="blue">PRO</span></h1>
        <p style="font-size: 10px; font-weight: 900; color: #94a3b8; letter-spacing: 2px; margin-top: 5px;">CAMP SBC • 2026</p>
        
        <div class="input-box">
            <label>E-mail Institucional</label>
            <input type="text" id="email_field" placeholder="exemplo@campsbc.org.br">
            
            <label>Senha de Acesso</label>
            <input type="password" id="pass_field" placeholder="••••••••">
            
            <button id="btn_login">Entrar no Portal</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="top-bar">
            <h1 style="font-size: 22px;">APRENDIZ <span class="blue">PRO</span></h1>

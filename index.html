<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
</head>
<body style="margin:0; background-color:#0f172a; font-family: sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;">

    <div id="wrapper" style="background:white; padding:40px; border-radius:40px; width:100%; max-width:400px; text-align:center; box-shadow:0 30px 60px rgba(0,0,0,0.5);">
        
        <div id="login_screen">
            <h1 style="font-weight:900; font-style:italic; font-size:32px; margin:0; letter-spacing:-2px;">APRENDIZ <span style="color:#2563eb;">PRO</span></h1>
            <p style="font-size:10px; font-weight:bold; color:#94a3b8; text-transform:uppercase; letter-spacing:2px; margin-bottom:30px;">CAMP SBC • 2026</p>
            
            <div style="text-align:left;">
                <label style="font-size:10px; font-weight:bold; color:#64748b; text-transform:uppercase; margin-left:5px;">E-mail Institucional</label>
                <input id="e" type="text" placeholder="exemplo@campsbc.org.br" style="width:100%; padding:15px; margin-top:5px; margin-bottom:15px; border:1px solid #e2e8f0; border-radius:15px; box-sizing:border-box; outline:none;">
                
                <label style="font-size:10px; font-weight:bold; color:#64748b; text-transform:uppercase; margin-left:5px;">Senha</label>
                <input id="p" type="password" placeholder="••••••••" style="width:100%; padding:15px; margin-top:5px; margin-bottom:25px; border:1px solid #e2e8f0; border-radius:15px; box-sizing:border-box; outline:none;">
                
                <button onclick="
                    var email = document.getElementById('e').value.trim().toLowerCase();
                    var pass = document.getElementById('p').value.trim();
                    var ano = new Date().getFullYear();
                    var ok = false;
                    var perfil = '';

                    if (email === 'admin@campsbc.org.br' && pass === 'campsbcadm@' + ano) { ok = true; perfil = 'ADMIN'; }
                    else if (email.indexOf('aprendiz@campsbc.org.br') !== -1 && pass.indexOf('camp@') === 0) { ok = true; perfil = 'JOVEM'; }
                    else if (email.indexOf('.') !== -1 && email.indexOf('@campsbc.org.br') !== -1 && pass === 'campsbc') { ok = true; perfil = 'INSTRUTOR'; }
                    else if (email.indexOf('@campsbc.org.br') !== -1 && pass.indexOf('@') !== -1 && email.split('@')[0] === pass.split('@')[0]) { ok = true; perfil = 'B2B'; }

                    if (ok) {
                        document.getElementById('login_screen').style.display = 'none';
                        document.getElementById('dash_screen').style.display = 'block';
                        document.getElementById('wrapper').style.maxWidth = '900px';
                        document.getElementById('perfil_tag').innerText = 'ACESSO LIBERADO: ' + perfil;
                        document.body.style.backgroundColor = '#f1f5f9';
                    } else {
                        alert('ERRO: Dados inválidos para 2026.\nVerifique e-mail e senha.');
                    }
                " style="width:100%; padding:20px; background:#2563eb; color:white; border:none; border-radius:15px; font-weight:900; text-transform:uppercase; font-style:italic; cursor:pointer; box-shadow:0 10px 20px rgba(37,99,235,0.3);">
                    Entrar no Portal
                </button>
            </div>
        </div>

        <div id="dash_screen" style="display:none; animation: fadeIn 0.5s;">
            <h2 style="font-weight:900; font-style:italic; font-size:30px; margin-bottom:10px;">Portal Ativado</h2>
            <p id="perfil_tag" style="font-weight:bold; color:#2563eb; font-size:12px; letter-spacing:1px; margin-bottom:30px;"></p>
            <div style="padding:60px; border:4px dashed #e2e8f0; border-radius:30px; color:#94a3b8; font-weight:bold; font-size:18px;">
                Módulos de Aprendizagem e B2B carregados com sucesso.
            </div>
            <button onclick="window.location.reload()" style="margin-top:30px; background:none; border:none; color:#ef4444; font-weight:900; cursor:pointer; text-transform:uppercase; font-size:11px;">Encerrar Sessão ✕</button>
        </div>

    </div>

    <style>@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }</style>
</body>
</html>

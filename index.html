<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiz Pro | Camp SBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #0f172a; font-family: sans-serif; display: flex; align-items: center; justify-center: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">

    <div id="container" style="background: white; border-radius: 40px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        
        <div id="login-view">
            <h1 style="font-weight: 900; font-style: italic; font-size: 30px; margin-bottom: 5px;">APRENDIZ <span style="color: #2563eb;">PRO</span></h1>
            <p style="font-size: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px;">CAMP SBC • 2026</p>
            
            <div style="text-align: left;">
                <input id="email" type="text" placeholder="E-mail Institucional" style="width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 15px; outline: none; box-sizing: border-box;">
                <input id="pass" type="password" placeholder="Senha" style="width: 100%; padding: 15px; margin-bottom: 25px; border: 1px solid #e2e8f0; border-radius: 15px; outline: none; box-sizing: border-box;">
                
                <button onclick="
                    var e = document.getElementById('email').value.trim().toLowerCase();
                    var p = document.getElementById('pass').value.trim();
                    var ano = new Date().getFullYear();
                    var user = '';

                    if (e === 'admin@campsbc.org.br' && p === 'campsbcadm@' + ano) { user = 'ADMIN'; }
                    else if (e.indexOf('aprendiz@campsbc.org.br') !== -1 && p.indexOf('camp@') === 0) { user = 'JOVEM'; }
                    else if (e.indexOf('.') !== -1 && e.indexOf('@campsbc.org.br') !== -1 && p === 'campsbc') { user = 'INSTRUTOR'; }
                    else if (e.indexOf('@campsbc.org.br') !== -1 && p.indexOf('@') !== -1 && e.split('@')[0] === p.split('@')[0]) { user = 'B2B'; }

                    if (user !== '') {
                        document.getElementById('login-view').style.display = 'none';
                        document.getElementById('dash-view').style.display = 'block';
                        document.getElementById('container').style.maxWidth = '800px';
                        document.getElementById('role-tag').innerText = 'PERFIL: ' + user;
                    } else {
                        alert('ERRO DE ACESSO!\nE-mail ou Senha incorretos para o padrão de 2026.');
                    }
                " style="width: 100%; padding: 18px; background: #2563eb; color: white; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; font-style: italic; cursor: pointer;">
                    Entrar no Portal
                </button>
            </div>
        </div>

        <div id="dash-view" style="display: none; animation: fadeIn 0.5s;">
            <h2 style="font-weight: 900; font-style: italic; font-size: 28px; margin-bottom: 10px;">Portal Ativado</h2>
            <p id="role-tag" style="font-weight: bold; color: #2563eb; font-size: 12px; margin-bottom: 30px;"></p>
            <div style="padding: 40px; border: 3px dashed #f1f5f9; border-radius: 30px; color: #94a3b8; font-weight: bold;">
                Módulos de Aprendizagem e Gestão carregados com sucesso.
            </div>
            <button onclick="window.location.reload()" style="margin-top: 30px; background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px;">Encerrar Sessão</button>
        </div>

    </div>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</body>
</html>

import React, { useState } from 'react';

// --- LÓGICA DE AUTENTICAÇÃO (CONFORME SUA REGRA) ---
const mockLogin = (email, password) => {
  if (email.endsWith('@campsbc.org.br')) {
    if (email.includes('.') && password === 'campsbc') return { role: 'instrutor', user: email };
    if (password.startsWith('camp@')) return { role: 'jovem', user: email };
  }
  return null;
};

export default function AprendizPro() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('lms');

  // Renderização da Aba 1: Aprendizagem (LMS)
  const RenderLMS = () => (
    <div className="p-6 space-y-6 animate-fadeIn">

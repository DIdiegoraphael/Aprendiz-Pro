      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {['Ciclo Inicial', 'Ciclo Básico', 'Ciclo Específico'].map((ciclo) => (
          <div key={ciclo} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
            <span className="text-xs font-semibold text-blue-600 uppercase tracking-wider">{ciclo}</span>
            <h3 className="text-lg font-medium mt-1">Módulo: Logística I</h3>
            <div className="mt-4 h-2 bg-slate-100 rounded-full overflow-hidden">
               <div className="h-full bg-blue-500 w-1/3"></div>
            </div>
            <button className="mt-4 w-full py-2 bg-slate-50 text-slate-700 rounded-lg hover:bg-blue-50 transition">Acessar LABS</button>
          </div>
        ))}
      </div>
    </div>
  );

  // Renderização da Aba 2: Instituições Parceiras
  const RenderParceiros = () => (
    <div className="p-6 space-y-4">

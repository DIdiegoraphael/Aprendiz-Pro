        <p className="opacity-90">Acesse o material completo exclusivo do Camp SBC.</p>
        <button className="mt-4 px-6 py-2 bg-white text-blue-700 rounded-full font-medium hover:bg-opacity-90 transition">Download de Materiais</button>
      </div>
      <a href="https://campsbc.org.br" className="block p-4 border-2 border-dashed border-slate-300 rounded-xl text-center text-slate-500 hover:border-blue-400 hover:text-blue-500 transition">
        Acesse o Portal de Aquisição da Metodologia →
